name: Deploy para VPS

on:
  push:
    branches:
      - main

# Evita dois deploys simultâneos sobrescrevendo o mesmo JAR / reiniciando o serviço ao mesmo tempo.
concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Garantir gradlew executável
        run: chmod +x ./gradlew

      # Gate de qualidade: se lint ou testes falharem, o deploy não acontece.
      - name: Lint e testes
        run: ./gradlew ktlintCheck test

      - name: Buildar shadowJar
        run: ./gradlew shadowJar

      - name: Configurar chave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ vars.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Enviar JAR para a VPS
        run: |
          scp build/libs/agendei.jar \
            "${{ vars.VPS_USER }}@${{ vars.VPS_HOST }}:${{ vars.VPS_TARGET_DIR }}/app.jar"

      - name: Reiniciar a aplicação na VPS
        run: |
          ssh "${{ vars.VPS_USER }}@${{ vars.VPS_HOST }}" \
            "cd ${{ vars.VPS_TARGET_DIR }} && ./deploy.sh"

      # Health check independente de rota: qualquer resposta HTTP (mesmo 401/404) significa que a app subiu.
      - name: Health check
        run: |
          ssh "${{ vars.VPS_USER }}@${{ vars.VPS_HOST }}" '
            for i in $(seq 1 10); do
              code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/ || true)
              if [ "$code" != "000" ]; then
                echo "App respondendo na porta 8080 (HTTP $code)"
                exit 0
              fi
              echo "Tentativa $i/10: app ainda não respondeu, aguardando 3s..."
              sleep 3
            done
            echo "Health check falhou: app não respondeu na porta 8080 após ~30s"
            exit 1
          '
